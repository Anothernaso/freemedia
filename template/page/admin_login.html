{% extends "base.html" %} {% block title %} Administrator Login {% endblock %}
{% block content %}
<h2>Administrator Login</h2>

{% if freemedia_request_session_expired %}
<p>Your previous session has expired. Please log in again.</p>
{% endif %}

<form
    action="/api/form/admin_login"
    method="post"
    enctype="multipart/form-data"
>
    <input
        type="password"
        name="passphrase"
        placeholder="Administration Passphrase"
    />
    <br />

    <button type="submit">Log In</button> <br />
</form>

{% endblock %}
