{% extends "base.html" %} {% block title %} {{ freemedia_request_static_path }}
{% endblock %} {% block content %}
<h2>{{ freemedia_request_static_path }}</h2>
<a href="{{ freemedia_request_static_path }}">View Raw</a>
<article id="markdownContent"></article>
{% endblock %} {% block script %}
<script>
    console.log("{{ freemedia_request_static_path }}");

    document.addEventListener("DOMContentLoaded", async () => {
        const markdownContent = document.getElementById("markdownContent");

        var response = await fetch("{{ freemedia_request_static_path }}");
        const markdown = await response.text();

        var response = await fetch("/api/misc/markdown", {
            method: "POST",
            headers: {
                "Content-Type": "text/markdown",
            },
            body: markdown,
        });
        const content = await response.text();
        console.log(content);
        markdownContent.innerHTML = content;
    });
</script>
{% endblock %}
